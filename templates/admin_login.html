<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDU MARKET Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
}

/* overlay */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(10,20,40,0.65);
}

/* login card */

.admin-card{
position:relative;
width:420px;
padding:35px;
background:#1e293b;
border-radius:16px;
color:white;
box-shadow:0 25px 50px rgba(0,0,0,.5);
text-align:center;
z-index:2;
}

/* logo */

.logo{
width:110px;
margin-bottom:10px;
}

/* title */

.panel-title{
font-weight:700;
font-size:22px;
margin-bottom:2px;
}

.panel-sub{
font-size:13px;
color:#cbd5f5;
margin-bottom:20px;
}

/* input container */

.input-group{
border-bottom:1px solid rgba(255,255,255,.3);
margin-bottom:20px;
}

.input-group input{
background:none;
border:none;
color:white;
outline:none;
padding:10px;
width:100%;
}

/* login button */

.login-btn{
background:#f59e0b;
border:none;
padding:10px 28px;
border-radius:25px;
color:white;
font-weight:600;
margin-top:10px;
transition:.3s;
}

.login-btn:hover{
background:#fbbf24;
transform:translateY(-2px);
}

/* wave effect */

.wave{
position:absolute;
bottom:0;
left:0;
width:100%;
height:120px;
background:linear-gradient(180deg,#4f46e5,#3b82f6);
border-bottom-left-radius:16px;
border-bottom-right-radius:16px;
clip-path:polygon(0 50%,20% 60%,40% 40%,60% 60%,80% 40%,100% 50%,100% 100%,0 100%);
}

/* error */

.alert{
font-size:14px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="admin-card">

<img src="{{ url_for('static', filename='images/edu_logo.png') }}" class="logo">

<div class="panel-title">ADMIN PANEL</div>
<div class="panel-sub">Control panel login</div>

{% if error %}

<div class="alert alert-danger text-center">
⚠ {{ error }}
</div>
{% endif %}

<form method="POST">

<div class="input-group">
<input type="text" name="email" placeholder="Administrator Email" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button class="login-btn">Login</button>

</form>

<div class="wave"></div>

</div>

</body>
</html>
