{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<div class="chat-card">

<div class="chat-header">
<h5>Chat with {{ other_user.name }}</h5>
</div>

<div id="chatBox" class="chat-box">

{% for m in messages %}

<div class="{% if m.sender_id == my_id %}my-msg{% else %}their-msg{% endif %}">
{{ m.message }}
</div>

{% endfor %}

</div>

<div class="chat-input">

<input id="messageInput"
class="form-control"
placeholder="Type a message...">

<button class="btn btn-primary"
onclick="sendMessage()">
Send </button>

</div>

</div>

</div>

<style>

.chat-card{
max-width:700px;
margin:auto;
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:hidden;
}

.chat-header{
padding:15px;
background:#2563eb;
color:white;
font-weight:600;
}

.chat-box{
height:420px;
overflow-y:auto;
padding:20px;
background:#f9fafb;
}

.my-msg{
background:#2563eb;
color:white;
padding:8px 12px;
border-radius:10px;
margin-bottom:10px;
margin-left:auto;
max-width:60%;
text-align:right;
}

.their-msg{
background:#e5e7eb;
padding:8px 12px;
border-radius:10px;
margin-bottom:10px;
max-width:60%;
}

.chat-input{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid #eee;
}

</style>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<script>

const socket = io();

const sender = {{ my_id }};
const receiver = {{ other_user.id }};

socket.emit("join", {user_id: sender});


function sendMessage(){

let msg = document.getElementById("messageInput").value;

if(msg.trim()===""){
return;
}

socket.emit("send_message",{
sender: sender,
receiver: receiver,
message: msg
});

document.getElementById("messageInput").value="";
}


socket.on("receive_message", function(data){

const chatBox = document.getElementById("chatBox");

let div = document.createElement("div");

if(data.sender == sender){
div.className="my-msg";
}else{
div.className="their-msg";
}

div.innerText = data.message;

chatBox.appendChild(div);

chatBox.scrollTop = chatBox.scrollHeight;

});

</script>

{% endblock %}
