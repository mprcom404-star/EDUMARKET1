<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>EduMarket Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* background animation */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
background:linear-gradient(-45deg,#1e3a8a,#2563eb,#4f46e5,#6366f1);
background-size:400% 400%;
animation:gradientMove 15s ease infinite;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* particles */

.particles{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.particles span{
position:absolute;
width:6px;
height:6px;
background:white;
opacity:.3;
border-radius:50%;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0)}
100%{transform:translateY(-10vh) scale(1)}
}

/* login card */

.login-card{
position:relative;
z-index:2;
width:390px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(16px);
box-shadow:0 25px 70px rgba(0,0,0,.4);
color:white;
text-align:center;
}

.login-title{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#3b82f6,#6366f1);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:700;
margin:0 auto 15px;
}

/* inputs */

.form-control{
border:none;
border-radius:10px;
padding:12px;
margin-bottom:14px;
background:rgba(255,255,255,.92);
}

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:600;
background:#111827;
color:white;
}

.google-btn{
margin-top:12px;
background:#db4437;
border:none;
border-radius:10px;
padding:11px;
width:100%;
color:white;
font-weight:600;
}

.register{
margin-top:16px;
font-size:14px;
}

</style>

</head>

<body>

<div class="particles">
<span style="left:10%;animation-delay:0s"></span>
<span style="left:20%;animation-delay:2s"></span>
<span style="left:30%;animation-delay:4s"></span>
<span style="left:40%;animation-delay:1s"></span>
<span style="left:50%;animation-delay:3s"></span>
<span style="left:60%;animation-delay:5s"></span>
<span style="left:70%;animation-delay:2s"></span>
<span style="left:80%;animation-delay:4s"></span>
<span style="left:90%;animation-delay:6s"></span>
</div>

<div class="login-card">

<div class="avatar" id="avatar">?</div>

<div class="login-title">Welcome Back</div>

<form method="POST">

<input type="email"
name="email"
id="emailInput"
class="form-control"
placeholder="Email address"
required>

<input type="password"
name="password"
class="form-control"
placeholder="Password"
required>

{% if show_otp %}

<input type="text"
name="otp"
class="form-control"
placeholder="Enter OTP"
maxlength="6"
required>

<button class="login-btn">
Verify OTP
</button>

{% else %}

<button class="login-btn">
Login
</button>

{% endif %}

</form>

<a href="/google-login">
<button class="google-btn">
Continue with Google
</button>
</a>

<div class="register">
Don't have an account?
<a href="/register">Register</a>
</div>

</div>

<script>

const emailInput=document.getElementById("emailInput")
const avatar=document.getElementById("avatar")

emailInput.addEventListener("input",function(){

let email=emailInput.value

if(email.length>0){
avatar.textContent=email.charAt(0).toUpperCase()
}else{
avatar.textContent="?"
}

})

</script>

</body>
</html>
