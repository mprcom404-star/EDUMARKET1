<!DOCTYPE html>

<html lang="en">

<head>

<title>Edit Product | EDU MARKET</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
font-family:'Segoe UI',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.edit-card{
width:600px;
background:white;
border-radius:18px;
padding:35px;
box-shadow:0 20px 50px rgba(0,0,0,0.12);
animation:fadeUp 0.5s ease;
}

.edit-title{
font-weight:700;
margin-bottom:25px;
}

.form-control{
border-radius:10px;
padding:10px;
border:1px solid #ddd;
}

.form-control:focus{
border-color:#4f46e5;
box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}

.btn-update{
background:#4f46e5;
border:none;
padding:10px;
border-radius:10px;
font-weight:600;
}

.btn-update:hover{
background:#4338ca;
}

.product-preview{
text-align:center;
margin-bottom:20px;
}

.product-preview img{
width:120px;
height:120px;
object-fit:cover;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="edit-card">

<h3 class="edit-title text-center">✏️ Edit Product</h3>

<div class="product-preview">

<img src="{{ url_for('static', filename='uploads/' + item.image) }}">

</div>

<form method="POST">

<div class="mb-3">
<label class="form-label">Product Name</label>
<input type="text" name="name" value="{{item.name}}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Price</label>
<input type="number" name="price" value="{{item.price}}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Category</label>
<input type="text" name="category" value="{{item.category}}" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" rows="4" class="form-control">{{item.description}}</textarea>
</div>

<button type="submit" class="btn btn-update w-100">
Update Product
</button>

<a href="/seller" class="btn btn-outline-secondary w-100 mt-2">
Back to Seller Dashboard
</a>

</form>

</div>

</body>

</html>
