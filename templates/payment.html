<!DOCTYPE html>
<html>
<head>

<title>Payment | EDU MARKET</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.payment-card{
width:480px;
background:white;
border-radius:18px;
padding:35px;
box-shadow:0 20px 50px rgba(0,0,0,0.12);
animation:fadeUp .5s ease;
}

.gateway{
font-size:13px;
color:#6b7280;
text-align:center;
margin-bottom:10px;
}

.price{
font-size:30px;
font-weight:700;
color:#16a34a;
margin-bottom:20px;
text-align:center;
}

.pay-btn{
border-radius:10px;
padding:12px;
font-weight:600;
width:100%;
}

.secure{
font-size:13px;
color:#6b7280;
margin-top:15px;
text-align:center;
}

.offer-box{
background:#f8fafc;
border-radius:10px;
padding:10px;
font-size:13px;
margin-bottom:15px;
}

.card-icons img{
width:35px;
margin-right:5px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="payment-card">

<div class="gateway">
🔐 EDU MARKET PAYMENT GATEWAY
</div>

<h4 class="text-center mb-3">Secure Checkout</h4>

<div class="price">₹{{total}}</div>

<!-- CUSTOM OFFER -->

<div class="offer-box">

<b>Special Offer</b><br>

Use code <b>EDU10</b> for 10% off on next purchase

</div>


<!-- PAYMENT METHOD TABS -->

<ul class="nav nav-tabs mb-3">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#upi">
UPI
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#card">
Card
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#cod">
COD
</button>
</li>

</ul>

<div class="tab-content">

<!-- UPI PAYMENT -->

<div class="tab-pane fade show active" id="upi">

<form method="POST" action="/payment-success">

<label class="mb-2">UPI ID</label>

<input
class="form-control mb-3"
name="upi"
placeholder="example@upi"
pattern="[a-zA-Z0-9.\-_]{2,256}@[a-zA-Z]{2,64}"
title="Enter valid UPI ID"
required>

<button name="method" value="UPI" class="btn btn-success pay-btn">
Pay via UPI
</button>

</form>

</div>

<!-- CARD PAYMENT -->

<div class="tab-pane fade" id="card">

<form method="POST" action="/payment-success">

<label class="mb-2">Card Number</label>

<input
class="form-control mb-3"
name="card_number"
placeholder="1234 5678 9012 3456"
maxlength="19"
pattern="[0-9\s]{16,19}"
title="Enter valid card number"
required>

<div class="card-icons mb-2">
<img src="https://img.icons8.com/color/48/visa.png">
<img src="https://img.icons8.com/color/48/mastercard.png">
<img src="https://img.icons8.com/color/48/rupay.png">
</div>

<div class="row">

<div class="col-md-6">

<label class="mb-1">Expiry</label>

<input
class="form-control mb-3"
name="expiry"
placeholder="MM/YY"
pattern="(0[1-9]|1[0-2])\/?([0-9]{2})"
title="MM/YY format"
required>

</div>

<div class="col-md-6">

<label class="mb-1">CVV</label>

<input
class="form-control mb-3"
name="cvv"
type="password"
maxlength="4"
pattern="[0-9]{3,4}"
title="3 or 4 digit CVV"
required>

</div>

</div>

<button name="method" value="CARD" class="btn btn-primary pay-btn">
Pay with Card
</button>

</form>

</div>

<!-- CASH ON DELIVERY -->

<div class="tab-pane fade" id="cod">

<form method="POST" action="/payment-success">

<p class="text-muted mb-3">
You will pay when the item is delivered.
</p>

<label class="mb-2">Contact Phone</label>

<input
class="form-control mb-3"
name="cod_phone"
pattern="[0-9]{10}"
maxlength="10"
placeholder="10 digit phone number"
required>

<button name="method" value="COD" class="btn btn-dark pay-btn">
Confirm Order (COD)
</button>

</form>

</div>

</div>

<p class="secure">
🔒 All transactions are secured with EDU MARKET encryption
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* CARD NUMBER AUTO FORMAT */

document.querySelectorAll('input[name="card_number"]').forEach(function(el){

el.addEventListener("input",function(){

let value=this.value.replace(/\D/g,'')

value=value.replace(/(.{4})/g,'$1 ').trim()

this.value=value

})

})

</script>

</body>
</html>
