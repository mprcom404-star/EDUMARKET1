<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
}

/* floating background shapes */

.bg-circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.08);
animation:float 10s infinite linear;
}

.c1{width:220px;height:220px;top:10%;left:15%;}
.c2{width:150px;height:150px;bottom:10%;right:15%;animation-duration:12s;}
.c3{width:300px;height:300px;bottom:-50px;left:-80px;animation-duration:15s;}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0px)}
}


/* glass login card */

.login-card{
width:420px;
padding:40px;
border-radius:18px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 20px 40px rgba(0,0,0,0.35);
color:white;
animation:cardEnter 0.7s ease;
}

@keyframes cardEnter{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}


/* title */

.login-title{
font-weight:700;
text-align:center;
margin-bottom:30px;
letter-spacing:1px;
}


/* animated inputs */

.form-control{
background:rgba(255,255,255,0.2);
border:none;
color:white;
border-radius:10px;
padding:12px;
}

.form-control:focus{
background:rgba(255,255,255,0.3);
box-shadow:0 0 10px rgba(255,255,255,0.3);
}


/* glowing login button */

.btn-admin{
background:linear-gradient(135deg,#3b82f6,#6366f1);
border:none;
padding:12px;
border-radius:30px;
font-weight:600;
color:white;
transition:0.3s;
}

.btn-admin:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(59,130,246,0.5);
}


/* link */

.back-link{
color:#cbd5f5;
text-decoration:none;
}

.back-link:hover{
color:white;
}

</style>

</head>


<body>

<!-- animated background shapes -->

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>
<div class="bg-circle c3"></div>


<div class="login-card">

<h3 class="login-title">Admin Control Panel</h3>

<form action="/admin-login" method="POST">

<div class="mb-3">

<label class="form-label">Admin Email</label>

<input type="email" name="email" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<input type="password" name="password" class="form-control" required>

</div>

<button type="submit" class="btn btn-admin w-100">
Login as Admin
</button>

<div class="text-center mt-4">

<a href="/" class="back-link">← Back to Marketplace</a>

</div>

</form>

</div>

</body>

</html>
