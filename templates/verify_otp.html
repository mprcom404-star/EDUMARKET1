{% extends "base.html" %}
{% block content %}

<div class="otp-container">

    <div class="otp-card">

        <div class="brand">EDU MARKET</div>

        <div class="security-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h3>Secure Email Verification</h3>

        <p class="subtitle">
            Enter the 6-digit verification code sent to your email.
        </p>

        <form method="POST">

            <input
                type="text"
                name="otp"
                maxlength="6"
                placeholder="------"
                class="otp-input"
                required>

            <button class="btn verify-btn">
                Verify Account
            </button>

        </form>

        <div class="resend">
            Didn't receive the code?
            <a href="#">Resend OTP</a>
        </div>

        <div class="security-note">
            🔒 Protected by EduMarket Secure Authentication
        </div>

    </div>

</div>

<style>

/* CONTAINER */

.otp-container{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#1e3a8a,#3b82f6);
}

/* CARD */

.otp-card{
width:420px;
padding:45px;
border-radius:18px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(14px);
box-shadow:0 25px 60px rgba(0,0,0,.3);
text-align:center;
color:white;
animation:fadeIn .6s ease;
}

/* BRAND */

.brand{
font-weight:700;
letter-spacing:2px;
font-size:18px;
margin-bottom:10px;
}

/* ICON */

.security-icon{
font-size:40px;
margin-bottom:10px;
color:#bfdbfe;
}

/* TEXT */

.subtitle{
font-size:14px;
color:#e2e8f0;
margin-bottom:25px;
}

/* OTP INPUT */

.otp-input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
text-align:center;
font-size:22px;
letter-spacing:8px;
background:rgba(255,255,255,.95);
transition:.25s;
}

.otp-input:focus{
outline:none;
box-shadow:0 0 0 2px #60a5fa;
transform:scale(1.05);
}

/* BUTTON */

.verify-btn{
margin-top:18px;
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#111827,#1f2937);
color:white;
font-weight:600;
transition:.3s;
}

.verify-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

/* RESEND */

.resend{
margin-top:15px;
font-size:14px;
color:#e5e7eb;
}

.resend a{
color:#93c5fd;
text-decoration:none;
font-weight:600;
}

/* SECURITY NOTE */

.security-note{
margin-top:12px;
font-size:12px;
color:#cbd5f5;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

{% endblock %}
